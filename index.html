<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📚 Modern PDF Flashcards</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --success: #10B981;
            --success-hover: #059669;
            --warning: #F59E0B;
            --warning-hover: #D97706;
            --secondary: #6B7280;
            --bg-gradient: linear-gradient(135deg, #EEF2F6 0%, #E3E8EF 100%);
            --card-bg: #ffffff;
            --text-main: #1F2937;
            --text-muted: #6B7280;
            --container-max-width: 550px; /* Standardmäßig Mobile-First */
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 16px;
            box-sizing: border-box;
        }

        .container {
            text-align: center;
            background: var(--card-bg);
            padding: 32px 24px;
            border-radius: 24px;
            box-shadow: 0 20px 40px -15px rgba(0,0,0,0.08);
            width: 100%;
            max-width: var(--container-max-width);
            box-sizing: border-box;
            transition: max-width 0.4s cubic-bezier(0.4, 0, 0.2, 1), padding 0.3s ease;
        }

        h1 {
            color: var(--text-main);
            margin-top: 0;
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: -0.025em;
            margin-bottom: 24px;
        }

        /* GERÄTE-SWITCH STYLING */
        .mode-switch-container {
            margin-bottom: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .mode-switch-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .mode-switch {
            background: #E2E8F0;
            border-radius: 12px;
            padding: 4px;
            display: inline-flex;
            gap: 4px;
            border: 1px solid #CBD5E1;
        }

        .mode-btn {
            background: transparent;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .mode-btn.active {
            background: var(--card-bg);
            color: var(--primary);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        /* Tutorial / Onboarding Styling */
        .tutorial-card {
            background: #F9FAFB;
            border: 1px solid #E5E7EB;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
            text-align: left;
        }

        .tutorial-card h3 {
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 1rem;
            color: var(--text-main);
        }

        .tutorial-step {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .tutorial-step:last-child {
            margin-bottom: 0;
        }

        .step-icon {
            background: #E0E7FF;
            color: var(--primary);
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.75rem;
            margin-right: 12px;
            flex-shrink: 0;
        }

        /* Steuerungselemente */
        .controls {
            margin-top: 20px;
            margin-bottom: 10px;
            width: 100%;
            display: flex;
            gap: 10px;
        }

        /* Datei-Upload */
        input[type="file"] {
            display: none;
        }
        .custom-file-upload {
            background: #EDF2F7;
            border: 2px dashed #CBD5E1;
            color: var(--primary);
            padding: 20px;
            border-radius: 16px;
            cursor: pointer;
            display: block;
            transition: all 0.2s ease;
            font-weight: 600;
            margin-bottom: 10px;
            box-sizing: border-box;
        }
        .custom-file-upload:hover {
            border-color: var(--primary);
            background: #EEF2F6;
        }

        /* Action-Buttons Base */
        .btn {
            color: white;
            border: none;
            padding: 16px 20px;
            font-size: 1.05rem;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 600;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }
        .btn:active {
            transform: scale(0.98);
        }

        .btn-main {
            flex: 1; 
        }

        #solve-btn {
            background-color: var(--warning);
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.2);
            color: white;
            display: none;
        }
        #solve-btn:hover {
            background-color: var(--warning-hover);
        }

        #next-btn {
            background-color: var(--success);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
            display: none;
        }
        #next-btn:hover {
            background-color: var(--success-hover);
        }

        #prev-btn {
            background-color: #E5E7EB;
            color: var(--text-main);
            display: none;
            padding: 16px 22px;
        }
        #prev-btn:hover {
            background-color: #D1D5DB;
        }

        /* Status-Badge */
        .status-badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 30px;
            font-weight: 700;
            margin-bottom: 16px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            animation: fadeIn 0.2s ease;
        }
        .status-frage {
            background-color: #EEF2F6;
            color: #374151;
            border: 1px solid #D1D5DB;
        }
        .status-antwort {
            background-color: #D1FAE5;
            color: #065F46;
        }

        /* Canvas-Container */
        #canvas-container {
            margin-top: 5px;
            border: 1px solid #E5E7EB;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
            background: #fff;
            display: block;
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            box-sizing: border-box;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        
        #canvas-container:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
        }
        
        #canvas-container:active {
            transform: scale(0.99);
        }

        #pdf-canvas {
            display: block;
            width: 100% !important;
            height: auto !important;
        }

        #page-info {
            margin-top: 16px;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mobile Querformat-Schonung */
        @media screen and (max-height: 520px) and (orientation: landscape) {
            body { padding: 8px; }
            .container { padding: 16px; border-radius: 16px; }
            h1 { font-size: 1.3rem; margin-bottom: 12px; }
            .mode-switch-container { margin-bottom: 12px; }
            .tutorial-card { padding: 12px; margin-bottom: 12px; }
            .custom-file-upload { padding: 14px; }
            .status-badge { margin-bottom: 10px; padding: 4px 12px; }
            .btn { padding: 12px; font-size: 1rem; }
        }
    </style>
</head>
<body>

<div class="container" id="app-container">
    <h1>📚 PDF Karteikarten</h1>
    
    <div class="mode-switch-container" id="mode-switch-section">
        <span class="mode-switch-label">Anzeige-Modus optimieren:</span>
        <div class="mode-switch">
            <button class="mode-btn active" id="mode-mobile-btn">📱 Smartphone</button>
            <button class="mode-btn" id="mode-desktop-btn">💻 Rechner</button>
        </div>
    </div>
    
    <div id="tutorial" class="tutorial-card">
        <h3>💡 Kurzanleitung:</h3>
        <div class="tutorial-step"><span class="step-icon">1</span><span>Ungerade Seiten = Fragen, Gerade Seiten = Antworten.</span></div>
        <div class="tutorial-step"><span class="step-icon">2</span><span>Wähle oben dein Endgerät für ideale Lesbarkeit.</span></div>
        <div class="tutorial-step"><span class="step-icon">3</span><span><b>Klicke direkt auf das PDF</b> oder die Tasten zum Umdrehen!</span></div>
    </div>

    <label class="custom-file-upload" id="upload-label">
        <input type="file" id="pdf-file" accept=".pdf">
        📂 PDF Lernkartei auswählen
    </label>
    
    <div id="status-container"></div>

    <div id="canvas-container" style="display: none;">
        <canvas id="pdf-canvas"></canvas>
    </div>
    
    <div class="controls">
        <button id="prev-btn" class="btn" title="Vorherige Frage">↩️</button>
        <button id="solve-btn" class="btn btn-main">💡 Lösung anzeigen</button>
        <button id="next-btn" class="btn btn-main">➡️ Nächste Frage</button>
    </div>
    
    <div id="page-info">Warte auf PDF...</div>
</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    let pdfDoc = null;
    let currentQuestionPage = 0;
    let isShowingAnswer = false;
    let pageHistory = []; 
    
    // Neue Variablen für die Non-Duplikat-Logik
    let shuffledQuestions = [];
    let currentIndex = -1;

    const appContainer = document.getElementById('app-container');
    const canvas = document.getElementById('pdf-canvas');
    const ctx = canvas.getContext('2d');
    const fileInput = document.getElementById('pdf-file');
    const uploadLabel = document.getElementById('upload-label');
    const solveBtn = document.getElementById('solve-btn');
    const nextBtn = document.getElementById('next-btn');
    const prevBtn = document.getElementById('prev-btn');
    const pageInfo = document.getElementById('page-info');
    const statusContainer = document.getElementById('status-container');
    const canvasContainer = document.getElementById('canvas-container');
    const tutorial = document.getElementById('tutorial');
    const modeSwitchSection = document.getElementById('mode-switch-section');
    
    // Switch Buttons
    const modeMobileBtn = document.getElementById('mode-mobile-btn');
    const modeDesktopBtn = document.getElementById('mode-desktop-btn');

    // Event-Listener für den Modus-Wechsel
    modeMobileBtn.addEventListener('click', () => setDisplayMode('mobile'));
    modeDesktopBtn.addEventListener('click', () => setDisplayMode('desktop'));

    function setDisplayMode(mode) {
        if (mode === 'desktop') {
            modeMobileBtn.classList.remove('active');
            modeDesktopBtn.classList.add('active');
            document.documentElement.style.setProperty('--container-max-width', '950px');
        } else {
            modeDesktopBtn.classList.remove('active');
            modeMobileBtn.classList.add('active');
            document.documentElement.style.setProperty('--container-max-width', '550px');
        }
        // Falls bereits ein Dokument geladen ist, rendern wir die Seite neu, damit sich das Canvas anpasst
        if (pdfDoc && currentQuestionPage > 0) {
            renderPage(isShowingAnswer ? currentQuestionPage + 1 : currentQuestionPage);
        }
    }

    function handleCardFlip() {
        if (!pdfDoc) return;
        if (!isShowingAnswer) {
            showAnswer();
        } else {
            prepareNextQuestion();
        }
    }

    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        if (file.type !== "application/pdf") {
            alert("Bitte wähle eine gültige PDF-Datei aus.");
            return;
        }

        pageInfo.textContent = "Wird geladen...";
        const fileReader = new FileReader();
        
        fileReader.onload = function() {
            const typedarray = new Uint8Array(this.result);
            
            pdfjsLib.getDocument(typedarray).promise.then(function(pdf) {
                pdfDoc = pdf;
                
                uploadLabel.style.display = "none"; 
                tutorial.style.display = "none"; 
                modeSwitchSection.style.display = "none"; // Schont den Platz während des Lernens
                canvasContainer.style.display = "block";
                
                // Generiere und mische den Fragenstapel für diese Lerneinheit
                initShuffledDeck();
                prepareNextQuestion(); 
            }).catch(function(error) {
                console.error(error);
                pageInfo.textContent = "Fehler beim Laden.";
                alert("Fehler beim Laden des PDFs: " + error.message);
            });
        };

        fileReader.readAsArrayBuffer(file);
    });

    // Erstellt ein durchgemischtes Array aller ungeraden Fragenseiten
    function initShuffledDeck() {
        const totalPages = pdfDoc.numPages;
        const maxQuestionIndex = Math.ceil(totalPages / 2);
        shuffledQuestions = [];
        
        for (let i = 0; i < maxQuestionIndex; i++) {
            shuffledQuestions.push((i * 2) + 1);
        }

        // Fisher-Yates Shuffle Algorithmus
        for (let i = shuffledQuestions.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffledQuestions[i], shuffledQuestions[j]] = [shuffledQuestions[j], shuffledQuestions[i]];
        }
        
        currentIndex = -1;
        pageHistory = [];
    }

    function prepareNextQuestion() {
        if (!pdfDoc || shuffledQuestions.length === 0) return;

        // Historie befüllen, falls es nicht die allererste Karte ist
        if (currentQuestionPage !== 0) {
            if (pageHistory.length === 0 || pageHistory[pageHistory.length - 1] !== currentQuestionPage) {
                pageHistory.push(currentQuestionPage);
            }
        }

        isShowingAnswer = false;
        currentIndex++;

        // Wenn alle Fragen durch sind, mischen wir für eine neue Runde neu
        if (currentIndex >= shuffledQuestions.length) {
            alert("Glückwunsch! Du hast alle Karten dieser Lerneinheit gesehen. Der Stapel wird neu gemischt.");
            initShuffledDeck();
            currentIndex = 0;
        }
        
        currentQuestionPage = shuffledQuestions[currentIndex];

        updateUIState();
        renderPage(currentQuestionPage);
    }

    function goToPreviousQuestion() {
        if (pageHistory.length === 0) return;

        currentQuestionPage = pageHistory.pop();
        isShowingAnswer = false;
        
        // Synchronisiere den currentIndex mit der Historie
        currentIndex = shuffledQuestions.indexOf(currentQuestionPage);

        updateUIState();
        renderPage(currentQuestionPage);
    }

    function showAnswer() {
        if (!pdfDoc) return;

        const answerPage = currentQuestionPage + 1;

        if (answerPage > pdfDoc.numPages) {
            alert("Für diese Frage gibt es keine Antwortseite.");
            return;
        }

        isShowingAnswer = true;
        updateUIState();
        renderPage(answerPage);
    }

    function updateUIState() {
        if (pageHistory.length > 0) {
            prevBtn.style.display = "block";
        } else {
            prevBtn.style.display = "none";
        }

        if (!isShowingAnswer) {
            solveBtn.style.display = "block";
            nextBtn.style.display = "none";
            statusContainer.innerHTML = '<span class="status-badge status-frage">❓ Frage</span>';
        } else {
            solveBtn.style.display = "none";
            nextBtn.style.display = "block";
            statusContainer.innerHTML = '<span class="status-badge status-antwort">✅ Antwort</span>';
        }
    }

    function renderPage(pageNum) {
        pageInfo.textContent = `Karte ${Math.ceil(pageNum / 2)} (Seite ${pageNum} von ${pdfDoc.numPages})`;

        pdfDoc.getPage(pageNum).then(function(page) {
            const viewport = page.getViewport({ scale: 2.0 }); 
            canvas.height = viewport.height;
            canvas.width = viewport.width;

            const renderContext = {
                canvasContext: ctx,
                viewport: viewport
            };
            page.render(renderContext);
        }).catch(function(err) {
            console.error("Fehler beim Rendern: ", err);
        });
    }

    // Event-Listener
    solveBtn.addEventListener('click', showAnswer);
    nextBtn.addEventListener('click', prepareNextQuestion);
    prevBtn.addEventListener('click', goToPreviousQuestion);
    canvasContainer.addEventListener('click', handleCardFlip);

    // Tastatursteuerung
    window.addEventListener('keydown', function(e) {
        if (pdfDoc) {
            if (e.key === " " || e.key === "Enter") {
                e.preventDefault(); 
                handleCardFlip();
            } else if (e.key === "ArrowLeft" || e.key === "Backspace") {
                e.preventDefault();
                goToPreviousQuestion();
            }
        }
    });
</script>

</body>
</html>
